<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Volume</title>
<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: radial-gradient(ellipse at 50% 35%, #1e1b4b 0%, #0c0c18 70%);
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  overflow: hidden;
  color: #fff;
  user-select: none;
}

/* ─── STAGE ─── */
#stage {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 36px;
}

.lbl {
  font-size: 11px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.3);
  font-weight: 500;
  transition: color 0.3s, font-size 0.3s;
}

/* ─── KNOB AREA ─── */
#knob-wrap {
  position: relative;
  width: 300px;
  height: 300px;
  display: flex;
  align-items: center;
  justify-content: center;
}

#knob-glow {
  position: absolute;
  inset: 40px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(139,92,246,0.4) 0%, transparent 72%);
  filter: blur(22px);
  transition: opacity 0.3s;
  pointer-events: none;
}

#tick-svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

#knob-wrap::before {
  content: '';
  position: absolute;
  width: 226px;
  height: 226px;
  border-radius: 50%;
  background: linear-gradient(150deg, #2e2e50 0%, #0e0e1e 55%);
  box-shadow:
    0 6px 20px rgba(0,0,0,0.55),
    inset 0 2px 3px rgba(255,255,255,0.07),
    inset 0 -2px 6px rgba(0,0,0,0.5);
  z-index: 1;
}

/* ─── KNOB ─── */
#knob {
  width: 200px;
  height: 200px;
  border-radius: 50%;
  position: relative;
  cursor: grab;
  flex-shrink: 0;
  z-index: 2;
  background:
    radial-gradient(circle at 42% 38%, #7a7aa0 0%, #42426a 25%, #232340 55%, #141422 85%);
  box-shadow:
    0 24px 64px rgba(0,0,0,0.7),
    0 6px 20px rgba(0,0,0,0.4),
    inset 0 3px 8px rgba(255,255,255,0.14),
    inset 0 -5px 14px rgba(0,0,0,0.65),
    inset 0 0 0 1.5px rgba(255,255,255,0.06);
  transition: box-shadow 0.25s;
}
#knob:active { cursor: grabbing; }
#knob:hover {
  box-shadow:
    0 28px 72px rgba(0,0,0,0.75),
    0 6px 26px rgba(139,92,246,0.28),
    inset 0 3px 8px rgba(255,255,255,0.17),
    inset 0 -5px 14px rgba(0,0,0,0.65),
    inset 0 0 0 1.5px rgba(255,255,255,0.09);
}

#knob-dot {
  position: absolute;
  width: 11px;
  height: 11px;
  border-radius: 50%;
  background: #c4b5fd;
  box-shadow:
    0 0 10px #a78bfa,
    0 0 28px rgba(167,139,250,0.6),
    0 0 2px rgba(255,255,255,0.8);
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
}

#knob-line {
  position: absolute;
  width: 2.5px;
  height: 50px;
  background: linear-gradient(to bottom, rgba(167,139,250,0.75), transparent);
  border-radius: 1.5px;
  top: 31px;
  left: 50%;
  transform: translateX(-50%);
}

/* ─── READOUT ─── */
#readout {
  font-size: 68px;
  font-weight: 100;
  letter-spacing: -3px;
  line-height: 1;
  color: #fff;
  text-align: center;
  min-width: 180px;
}
#readout .pct {
  font-size: 24px;
  font-weight: 300;
  color: rgba(255,255,255,0.38);
  letter-spacing: 0;
  margin-left: 4px;
}

/* ─── CHAOS ─── */
body.chaos {
  animation: bgFlash 0.14s steps(1) infinite;
  cursor: none;
}
@keyframes bgFlash {
  0%   { background: #ff0035; }
  14%  { background: #ff8c00; }
  28%  { background: #00ff5e; }
  42%  { background: #004fff; }
  57%  { background: #cc00ff; }
  71%  { background: #ffff00; }
  85%  { background: #00d4ff; }
}

body.chaos .lbl {
  font-family: Impact, sans-serif;
  color: #ffff00 !important;
  text-shadow: 2px 2px 0 #000, -1px -1px 0 #000;
  font-size: 22px;
  letter-spacing: 3px;
  animation: txtShake 0.08s infinite;
}
@keyframes txtShake {
  0%  { transform: translate(0,0) rotate(0); }
  25% { transform: translate(4px,-2px) rotate(2deg); }
  50% { transform: translate(-4px,2px) rotate(-2deg); }
  75% { transform: translate(2px,3px) rotate(0.5deg); }
}

body.chaos #readout {
  font-family: Impact, sans-serif;
  font-size: 96px;
  font-weight: 900;
  color: #ffff00;
  text-shadow: 5px 5px 0 #000, -2px -2px 0 #f00;
  letter-spacing: -4px;
  animation: numShake 0.06s infinite;
}
body.chaos #readout .pct {
  color: #ff3333;
  font-size: 36px;
  text-shadow: 3px 3px 0 #000;
}
@keyframes numShake {
  0%  { transform: translate(0,0) skew(0); }
  20% { transform: translate(6px,-6px) skew(-2.5deg); }
  40% { transform: translate(-6px,6px) skew(2.5deg); }
  60% { transform: translate(6px,6px) skew(-1.5deg); }
  80% { transform: translate(-6px,-6px) skew(1.5deg); }
}

body.chaos #knob {
  animation: knobPulse 0.16s infinite;
  cursor: none !important;
}
@keyframes knobPulse {
  0%   { box-shadow: 0 0 36px 14px rgba(255,0,80,0.85), inset 0 3px 8px rgba(255,255,255,0.14); }
  33%  { box-shadow: 0 0 36px 14px rgba(0,255,100,0.85), inset 0 3px 8px rgba(255,255,255,0.14); }
  66%  { box-shadow: 0 0 36px 14px rgba(80,100,255,0.85), inset 0 3px 8px rgba(255,255,255,0.14); }
}

#knob.pre-chaos {
  animation: preShake 0.25s infinite;
}
@keyframes preShake {
  0%  { transform: rotate(var(--vdeg)) translate(0,0); }
  25% { transform: rotate(var(--vdeg)) translate(2px,-1px); }
  50% { transform: rotate(var(--vdeg)) translate(-2px,1px); }
  75% { transform: rotate(var(--vdeg)) translate(1px,2px); }
}

/* ─── HUD (chaos) ─── */
#hud {
  position: fixed;
  top: 18px;
  left: 50%;
  transform: translateX(-50%);
  display: none;
  gap: 20px;
  align-items: center;
  padding: 12px 22px;
  background: rgba(0,0,0,0.55);
  border: 2px solid #ffff00;
  border-radius: 8px;
  font-family: Impact, sans-serif;
  letter-spacing: 2px;
  z-index: 70;
  pointer-events: none;
  box-shadow: 0 0 20px rgba(255,255,0,0.4);
}
body.chaos #hud { display: flex; }
.hud-stat {
  display: flex;
  flex-direction: column;
  align-items: center;
  min-width: 64px;
}
.hud-stat .k {
  font-size: 10px;
  color: rgba(255,255,255,0.55);
  letter-spacing: 3px;
}
.hud-stat .v {
  font-size: 26px;
  color: #fff;
  text-shadow: 2px 2px 0 #000;
  line-height: 1;
  margin-top: 3px;
}
.hud-stat .v.streak { color: #ffd24a; }
.hud-stat .v.accu   { color: #4ade80; }

#mission {
  position: fixed;
  bottom: 22px;
  left: 50%;
  transform: translateX(-50%);
  display: none;
  font-family: Impact, sans-serif;
  font-size: 22px;
  letter-spacing: 3px;
  color: #fff;
  text-shadow: 3px 3px 0 #000, 0 0 12px rgba(255,255,0,0.7);
  z-index: 70;
  pointer-events: none;
  text-align: center;
}
body.chaos #mission { display: block; }
#mission .danger { color: #ff5050; }
#mission .good   { color: #4ade80; }

/* ─── CROSSHAIR ─── */
#crosshair {
  position: fixed;
  width: 38px;
  height: 38px;
  pointer-events: none;
  display: none;
  z-index: 999;
  transform: translate(-50%, -50%);
  mix-blend-mode: difference;
}
#crosshair::before, #crosshair::after {
  content: '';
  position: absolute;
  background: #fff;
  box-shadow: 0 0 4px rgba(255,255,255,0.8);
}
#crosshair::before {
  left: 50%; top: 0; width: 2px; height: 100%;
  transform: translateX(-50%);
}
#crosshair::after {
  top: 50%; left: 0; height: 2px; width: 100%;
  transform: translateY(-50%);
}
#crosshair .ring {
  position: absolute;
  inset: 25%;
  border: 2px solid #fff;
  border-radius: 50%;
  box-shadow: 0 0 6px rgba(255,255,255,0.8);
}
body.chaos #crosshair { display: block; }

/* ─── GAME TARGETS ─── */
#game {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 60;
}
.hit {
  position: absolute;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 900;
  font-family: Impact, sans-serif;
  color: #fff;
  pointer-events: auto;
  cursor: none;
  text-shadow: 2px 2px 5px rgba(0,0,0,0.6);
  border: 3px solid rgba(255,255,255,0.28);
  transform: translate(-50%, -50%) scale(0);
  animation: hitIn 0.18s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}
.hit.plus {
  background: radial-gradient(circle at 38% 32%, #ff8080, #aa0000);
  box-shadow:
    0 0 28px rgba(255,50,50,0.7),
    0 5px 14px rgba(0,0,0,0.45),
    inset 0 0 0 2px rgba(255,255,255,0.15);
}
.hit.minus {
  background: radial-gradient(circle at 38% 32%, #70ffaf, #006e2e);
  box-shadow:
    0 0 28px rgba(74,222,128,0.7),
    0 5px 14px rgba(0,0,0,0.45),
    inset 0 0 0 2px rgba(255,255,255,0.15);
}
@keyframes hitIn {
  0%   { transform: translate(-50%,-50%) scale(0) rotate(-30deg); }
  60%  { transform: translate(-50%,-50%) scale(1.15) rotate(8deg); }
  100% { transform: translate(-50%,-50%) scale(1) rotate(0); }
}
.hit.gone { animation: hitOut 0.22s ease-out forwards; pointer-events: none; }
@keyframes hitOut {
  to { transform: translate(-50%,-50%) scale(1.6); opacity: 0; }
}

/* lifetime ring (SVG) */
.hit svg.ring {
  position: absolute;
  inset: -8px;
  width: calc(100% + 16px);
  height: calc(100% + 16px);
  pointer-events: none;
  transform: rotate(-90deg);
}
.hit svg.ring circle {
  fill: none;
  stroke: rgba(255,255,255,0.95);
  stroke-width: 3;
  stroke-linecap: round;
  filter: drop-shadow(0 0 4px rgba(255,255,255,0.6));
}

/* floating score popup */
.popup {
  position: fixed;
  font-family: Impact, sans-serif;
  font-size: 36px;
  font-weight: 900;
  pointer-events: none;
  z-index: 80;
  text-shadow: 3px 3px 0 #000;
  transform: translate(-50%, -50%);
  animation: popUp 0.85s ease-out forwards;
}
.popup.good { color: #4ade80; }
.popup.bad  { color: #ff5050; }
@keyframes popUp {
  0%   { opacity: 0; transform: translate(-50%, -40%) scale(0.5); }
  20%  { opacity: 1; transform: translate(-50%, -55%) scale(1.2); }
  100% { opacity: 0; transform: translate(-50%, -120%) scale(0.9); }
}

/* hit shockwave */
.shock {
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  z-index: 75;
  transform: translate(-50%, -50%);
  border: 3px solid currentColor;
  animation: shockOut 0.55s ease-out forwards;
}
.shock.good { color: rgba(74,222,128,0.9); }
.shock.bad  { color: rgba(255,80,80,0.9); }
@keyframes shockOut {
  0%   { width: 20px; height: 20px; opacity: 1; }
  100% { width: 220px; height: 220px; opacity: 0; }
}

/* ─── VICTORY SCREEN ─── */
#victory {
  position: fixed;
  inset: 0;
  z-index: 500;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 22px;
  background: radial-gradient(ellipse at center, #0a1f0a 0%, #000 80%);
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
}
#victory.show { display: flex; animation: vicIn 0.4s ease-out; }
@keyframes vicIn { from { opacity: 0; } to { opacity: 1; } }
#victory h1 {
  font-family: Impact, sans-serif;
  font-size: 96px;
  letter-spacing: 6px;
  color: #4ade80;
  text-shadow: 5px 5px 0 #000, 0 0 40px rgba(74,222,128,0.8);
  animation: vicPulse 1.2s ease-in-out infinite;
}
@keyframes vicPulse {
  0%, 100% { transform: scale(1); }
  50%      { transform: scale(1.05); }
}
#victory .sub {
  font-size: 18px;
  letter-spacing: 4px;
  color: rgba(255,255,255,0.7);
  text-transform: uppercase;
}
#victory .stats {
  display: flex;
  gap: 40px;
  margin-top: 18px;
  font-family: Impact, sans-serif;
}
#victory .stats > div {
  display: flex;
  flex-direction: column;
  align-items: center;
  min-width: 100px;
  padding: 14px 18px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px;
}
#victory .stats .k {
  font-size: 11px;
  letter-spacing: 3px;
  color: rgba(255,255,255,0.5);
  font-family: 'Segoe UI', sans-serif;
  font-weight: 500;
}
#victory .stats .v {
  font-size: 38px;
  color: #fff;
  margin-top: 6px;
}
#victory button {
  margin-top: 14px;
  background: transparent;
  border: 2px solid #4ade80;
  color: #4ade80;
  padding: 12px 32px;
  font-family: Impact, sans-serif;
  font-size: 18px;
  letter-spacing: 4px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s;
}
#victory button:hover {
  background: #4ade80;
  color: #000;
  box-shadow: 0 0 24px rgba(74,222,128,0.6);
}

</style>
</head>
<body>

<div id="stage">
  <div class="lbl" id="top-label">Volume</div>

  <div id="knob-wrap">
    <div id="knob-glow"></div>
    <svg id="tick-svg" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg"></svg>
    <div id="knob">
      <div id="knob-line"></div>
      <div id="knob-dot"></div>
    </div>
  </div>

  <div id="readout">30<span class="pct">%</span></div>
  <div class="lbl" id="hint">drag up &middot; down</div>
</div>

<div id="hud">
  <div class="hud-stat"><div class="k">VOL</div><div class="v" id="hud-vol">30%</div></div>
  <div class="hud-stat"><div class="k">SCORE</div><div class="v" id="hud-score">0</div></div>
  <div class="hud-stat"><div class="k">STREAK</div><div class="v streak" id="hud-streak">0</div></div>
  <div class="hud-stat"><div class="k">ACCU</div><div class="v accu" id="hud-accu">—</div></div>
</div>

<div id="mission">
  HIT <span class="good">−</span> &nbsp; AVOID <span class="danger">+</span> &nbsp; SILENCE THE CHAOS
</div>

<div id="crosshair"><div class="ring"></div></div>
<div id="game"></div>

<div id="victory">
  <div class="sub">CHAOS NEUTRALIZED</div>
  <h1>SILENCE</h1>
  <div class="stats">
    <div><div class="k">SCORE</div><div class="v" id="vic-score">0</div></div>
    <div><div class="k">ACCURACY</div><div class="v" id="vic-accu">0%</div></div>
    <div><div class="k">BEST STREAK</div><div class="v" id="vic-streak">0</div></div>
    <div><div class="k">TIME</div><div class="v" id="vic-time">0s</div></div>
  </div>
  <button id="vic-again">PLAY AGAIN</button>
</div>

<script>
// ─── CONSTANTS ──────────────────────────────────────────────
const SVG_NS   = 'http://www.w3.org/2000/svg';
const CX = 150, CY = 150;
const TRACK_R  = 140;
const TICK_OUT = 142;
const START    = -135;
const RANGE    = 270;

// ─── STATE ──────────────────────────────────────────────────
let volume        = 0.30;
let isDragging    = false;
let lastY         = 0;
let audioStarted  = false;
let chaosScheduled= false;
let chaosStarted  = false;
let chaosWon      = false;

let audioCtx, masterGain, osc1, osc2, noiseSrc, chaosOsc, chaosLfo;
let chaosTickInt, knobBounceInt, lblBounceInt, spawnInt, creepInt;

// game stats
let score = 0, streak = 0, bestStreak = 0;
let hits = 0, misses = 0;
let chaosStartTime = 0;

// bounce positions
let kx, ky, kvx = 6.5, kvy = 4.8;
let lx, ly, lvx = 4.2, lvy = 3.5;

// ─── ELEMENTS ───────────────────────────────────────────────
const knob     = document.getElementById('knob');
const knobGlow = document.getElementById('knob-glow');
const tickSvg  = document.getElementById('tick-svg');
const readout  = document.getElementById('readout');
const topLabel = document.getElementById('top-label');
const game     = document.getElementById('game');
const crosshair= document.getElementById('crosshair');
const hudVol   = document.getElementById('hud-vol');
const hudScore = document.getElementById('hud-score');
const hudStreak= document.getElementById('hud-streak');
const hudAccu  = document.getElementById('hud-accu');
const victory  = document.getElementById('victory');

// ─── SVG UTILITIES ──────────────────────────────────────────
function toXY(deg, r) {
  const rad = (deg - 90) * Math.PI / 180;
  return { x: CX + r * Math.cos(rad), y: CY + r * Math.sin(rad) };
}

function arcD(a1, a2, r) {
  const s = toXY(a1, r);
  const e = toXY(a2, r);
  const large = (a2 - a1) > 180 ? 1 : 0;
  return `M${s.x.toFixed(2)} ${s.y.toFixed(2)} A${r} ${r} 0 ${large} 1 ${e.x.toFixed(2)} ${e.y.toFixed(2)}`;
}

// ─── BUILD SVG ──────────────────────────────────────────────
const defs = document.createElementNS(SVG_NS, 'defs');
defs.innerHTML = `
  <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="2.8" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%"   stop-color="#6d28d9"/>
    <stop offset="100%" stop-color="#c4b5fd"/>
  </linearGradient>
`;
tickSvg.appendChild(defs);

const trackBg = document.createElementNS(SVG_NS, 'path');
trackBg.setAttribute('d', arcD(START, START + RANGE, TRACK_R));
trackBg.setAttribute('fill', 'none');
trackBg.setAttribute('stroke', 'rgba(255,255,255,0.07)');
trackBg.setAttribute('stroke-width', '5');
trackBg.setAttribute('stroke-linecap', 'round');
tickSvg.appendChild(trackBg);

const trackFill = document.createElementNS(SVG_NS, 'path');
trackFill.setAttribute('fill', 'none');
trackFill.setAttribute('stroke', '#9333ea');
trackFill.setAttribute('stroke-width', '5');
trackFill.setAttribute('stroke-linecap', 'round');
trackFill.setAttribute('filter', 'url(#glow)');
tickSvg.appendChild(trackFill);

const TICK_N = 13;
const tickEls = [];
for (let i = 0; i < TICK_N; i++) {
  const frac    = i / (TICK_N - 1);
  const angle   = frac * RANGE + START;
  const isMaj   = i % 6 === 0;
  const innerR  = isMaj ? TICK_OUT - 12 : TICK_OUT - 7;

  const p1 = toXY(angle, TICK_OUT);
  const p2 = toXY(angle, innerR);

  const line = document.createElementNS(SVG_NS, 'line');
  line.setAttribute('x1', p1.x.toFixed(2));
  line.setAttribute('y1', p1.y.toFixed(2));
  line.setAttribute('x2', p2.x.toFixed(2));
  line.setAttribute('y2', p2.y.toFixed(2));
  line.setAttribute('stroke-linecap', 'round');
  line.setAttribute('stroke-width', isMaj ? '2.5' : '1.5');

  tickEls.push({ el: line, frac });
  tickSvg.appendChild(line);
}

// ─── VISUALS ────────────────────────────────────────────────
function updateVisuals() {
  const vdeg = volume * RANGE + START;

  knob.style.setProperty('--vdeg', vdeg.toFixed(1) + 'deg');
  if (!knob.classList.contains('pre-chaos')) {
    knob.style.transform = `rotate(${vdeg.toFixed(1)}deg)`;
  }

  readout.innerHTML = `${Math.round(volume * 100)}<span class="pct">%</span>`;
  hudVol.textContent = `${Math.round(volume * 100)}%`;

  if (volume > 0.005) {
    trackFill.setAttribute('d', arcD(START, vdeg, TRACK_R));
    trackFill.style.opacity = '1';
  } else {
    trackFill.style.opacity = '0';
  }

  tickEls.forEach(({ el, frac }) => {
    if (frac <= volume + 0.004) {
      el.setAttribute('stroke', '#a78bfa');
    } else {
      el.setAttribute('stroke', 'rgba(255,255,255,0.13)');
    }
  });

  knobGlow.style.opacity = (0.35 + volume * 0.65).toFixed(2);
}

function setVolume(v, fromGame) {
  volume = Math.max(0, Math.min(1, v));
  if (masterGain) {
    if (fromGame) masterGain.gain.setTargetAtTime(volume, audioCtx.currentTime, 0.04);
    else          masterGain.gain.value = volume;
  }
  updateVisuals();
  if (chaosStarted && !chaosWon && volume <= 0.001) winChaos();
}

updateVisuals();

// ─── AUDIO ──────────────────────────────────────────────────
function makeNoise(ctx) {
  const buf = ctx.createBuffer(1, ctx.sampleRate * 2, ctx.sampleRate);
  const ch  = buf.getChannelData(0);
  for (let i = 0; i < ch.length; i++) ch[i] = Math.random() * 2 - 1;
  const src = ctx.createBufferSource();
  src.buffer = buf;
  src.loop   = true;
  return src;
}

function startAudio() {
  audioCtx   = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = volume;

  osc1 = audioCtx.createOscillator();
  osc2 = audioCtx.createOscillator();
  osc1.type = 'sine';     osc1.frequency.value = 220;
  osc2.type = 'triangle'; osc2.frequency.value = 330;

  const lg = audioCtx.createGain();
  lg.gain.value = 0.11;
  osc1.connect(lg); osc2.connect(lg); lg.connect(masterGain);

  noiseSrc = makeNoise(audioCtx);
  const ng = audioCtx.createGain();
  ng.gain.value = 0.022;
  noiseSrc.connect(ng); ng.connect(masterGain);

  masterGain.connect(audioCtx.destination);
  osc1.start(); osc2.start(); noiseSrc.start();
}

// short blip used for hit / miss feedback
function blip(freq, dur, type, peak) {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type || 'square';
  o.frequency.setValueAtTime(freq, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(freq * 0.5, audioCtx.currentTime + dur);
  g.gain.setValueAtTime(0, audioCtx.currentTime);
  g.gain.linearRampToValueAtTime(peak || 0.18, audioCtx.currentTime + 0.005);
  g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start();
  o.stop(audioCtx.currentTime + dur + 0.02);
}

// ─── CHAOS ──────────────────────────────────────────────────
function startChaos() {
  if (chaosStarted) return;
  chaosStarted = true;
  chaosStartTime = performance.now();

  knob.classList.remove('pre-chaos');
  document.body.classList.add('chaos');

  // swap audio to chaotic square wave
  try { osc1.stop(); osc2.stop(); noiseSrc.stop(); } catch(e) {}

  chaosOsc = audioCtx.createOscillator();
  chaosOsc.type = 'square';
  chaosOsc.frequency.value = 880;
  chaosOsc.connect(masterGain);
  chaosOsc.start();

  chaosTickInt = setInterval(() => {
    // keep gain riding the player's volume, but jitter inside it
    const base = volume;
    const jit  = base * (0.55 + Math.random() * 0.45);
    masterGain.gain.setTargetAtTime(jit, audioCtx.currentTime, 0.02);
    chaosOsc.frequency.value = 180 + Math.random() * 1700;
  }, 110);

  // detach knob → fixed + bounce
  const kr = knob.getBoundingClientRect();
  kx = kr.left; ky = kr.top;
  knob.style.cssText += ';position:fixed;left:' + kx + 'px;top:' + ky + 'px;z-index:200;';
  document.body.appendChild(knob);

  knobBounceInt = setInterval(() => {
    kx += kvx; ky += kvy;
    if (kx <= 0 || kx >= window.innerWidth  - 200) kvx *= -1;
    if (ky <= 0 || ky >= window.innerHeight - 200) kvy *= -1;
    knob.style.left = kx + 'px';
    knob.style.top  = ky + 'px';
  }, 16);

  // detach label → fixed + bounce
  const lr = topLabel.getBoundingClientRect();
  lx = lr.left; ly = lr.top;
  topLabel.style.cssText += ';position:fixed;left:' + lx + 'px;top:' + ly + 'px;z-index:200;';
  document.body.appendChild(topLabel);

  lblBounceInt = setInterval(() => {
    lx += lvx; ly += lvy;
    if (lx <= 0 || lx >= window.innerWidth  - 130) lvx *= -1;
    if (ly <= 0 || ly >= window.innerHeight -  36) lvy *= -1;
    topLabel.style.left = lx + 'px';
    topLabel.style.top  = ly + 'px';
  }, 16);

  // game tick: spawn a target on a tightening cadence
  scheduleSpawn();

  // creep: untouched chaos slowly cranks the volume up
  creepInt = setInterval(() => {
    if (chaosWon) return;
    setVolume(volume + 0.012, true);
  }, 700);
}

function scheduleSpawn() {
  if (chaosWon) return;
  const elapsed = (performance.now() - chaosStartTime) / 1000;
  // spawn cadence speeds up over the first ~25s
  const delay = Math.max(380, 900 - elapsed * 22);
  spawnInt = setTimeout(() => {
    spawnTarget();
    scheduleSpawn();
  }, delay);
}

// ─── AIM-LAB STYLE TARGETS ──────────────────────────────────
function spawnTarget() {
  if (chaosWon) return;

  // mostly minus targets; occasional plus traps
  const elapsed = (performance.now() - chaosStartTime) / 1000;
  const plusChance = Math.min(0.28, 0.10 + elapsed * 0.005);
  const isMinus = Math.random() > plusChance;

  // varied target sizes — smaller = harder = more reward
  const size = isMinus
    ? 56 + Math.random() * 44   // 56–100 px
    : 70 + Math.random() * 30;  // traps a bit bigger so they're easy to "see"

  const margin = size / 2 + 30;
  const x = margin + Math.random() * (window.innerWidth  - margin * 2);
  const y = margin + 70 + Math.random() * (window.innerHeight - margin * 2 - 110);

  const lifetime = isMinus
    ? Math.max(900, 1700 - elapsed * 18) // shrinks as game goes on
    : 1500;

  spawnHit(x, y, isMinus, size, lifetime);
}

function spawnHit(x, y, isMinus, size, lifetime) {
  const el = document.createElement('div');
  el.className = 'hit ' + (isMinus ? 'minus' : 'plus');
  el.textContent = isMinus ? '−' : '+';
  el.style.left = x + 'px';
  el.style.top  = y + 'px';
  el.style.width  = size + 'px';
  el.style.height = size + 'px';
  el.style.fontSize = (size * 0.55) + 'px';

  // lifetime ring
  const ringSvg = document.createElementNS(SVG_NS, 'svg');
  ringSvg.setAttribute('class', 'ring');
  ringSvg.setAttribute('viewBox', '0 0 100 100');
  const ring = document.createElementNS(SVG_NS, 'circle');
  ring.setAttribute('cx', '50');
  ring.setAttribute('cy', '50');
  ring.setAttribute('r',  '46');
  const C = 2 * Math.PI * 46;
  ring.setAttribute('stroke-dasharray', C.toFixed(2));
  ring.setAttribute('stroke-dashoffset', '0');
  ring.style.transition = `stroke-dashoffset ${lifetime}ms linear`;
  ringSvg.appendChild(ring);
  el.appendChild(ringSvg);
  // trigger transition
  requestAnimationFrame(() => { ring.setAttribute('stroke-dashoffset', C.toFixed(2)); });

  let resolved = false;
  const resolve = (clicked) => {
    if (resolved) return;
    resolved = true;
    clearTimeout(killer);
    el.classList.add('gone');
    setTimeout(() => el.remove(), 230);

    if (clicked) {
      hits++;
      if (isMinus) {
        // smaller targets reward more vol-reduction & more score
        const sizeBonus = (100 - size) / 100;            // 0..0.78
        const drop      = 0.08 + sizeBonus * 0.10;       // 8–18%
        const points    = Math.round(50 + sizeBonus * 150); // 50–167 base
        streak++;
        if (streak > bestStreak) bestStreak = streak;
        const streakMult = 1 + Math.min(streak * 0.05, 1); // up to 2x
        const award = Math.round(points * streakMult);
        score += award;
        setVolume(volume - drop, true);
        popup(x, y, '−' + Math.round(drop * 100) + '%', 'good');
        shock(x, y, 'good');
        blip(740 + Math.min(streak, 12) * 40, 0.10, 'square', 0.16);
      } else {
        // hit a TRAP
        streak = 0;
        score = Math.max(0, score - 60);
        setVolume(volume + 0.10, true);
        popup(x, y, 'TRAP +10%', 'bad');
        shock(x, y, 'bad');
        blip(140, 0.22, 'sawtooth', 0.22);
      }
    } else {
      // expired untouched
      if (isMinus) {
        misses++;
        streak = 0;
        setVolume(volume + 0.05, true);
      }
      // ignored traps are GOOD — no penalty, no reward
    }
    updateHud();
  };

  el.onmousedown = (ev) => { ev.preventDefault(); resolve(true); };
  const killer = setTimeout(() => resolve(false), lifetime);

  game.appendChild(el);
}

function popup(x, y, text, kind) {
  const p = document.createElement('div');
  p.className = 'popup ' + kind;
  p.textContent = text;
  p.style.left = x + 'px';
  p.style.top  = y + 'px';
  document.body.appendChild(p);
  setTimeout(() => p.remove(), 900);
}

function shock(x, y, kind) {
  const s = document.createElement('div');
  s.className = 'shock ' + kind;
  s.style.left = x + 'px';
  s.style.top  = y + 'px';
  document.body.appendChild(s);
  setTimeout(() => s.remove(), 600);
}

function updateHud() {
  hudScore.textContent  = score;
  hudStreak.textContent = streak;
  const total = hits + misses;
  hudAccu.textContent = total === 0 ? '—' : Math.round(hits / total * 100) + '%';
}

// ─── WIN ────────────────────────────────────────────────────
function winChaos() {
  chaosWon = true;
  // tear down chaos
  clearInterval(chaosTickInt);
  clearInterval(knobBounceInt);
  clearInterval(lblBounceInt);
  clearInterval(creepInt);
  clearTimeout(spawnInt);
  document.body.classList.remove('chaos');
  try { chaosOsc.stop(); } catch(e) {}
  if (masterGain) masterGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.05);

  // clear remaining targets
  game.querySelectorAll('.hit').forEach(e => e.remove());

  // populate victory screen
  const total = hits + misses;
  const accu  = total === 0 ? 0 : Math.round(hits / total * 100);
  const secs  = ((performance.now() - chaosStartTime) / 1000).toFixed(1);
  document.getElementById('vic-score').textContent  = score;
  document.getElementById('vic-accu').textContent   = accu + '%';
  document.getElementById('vic-streak').textContent = bestStreak;
  document.getElementById('vic-time').textContent   = secs + 's';
  victory.classList.add('show');

  // celebratory chord
  blip(523, 0.18, 'triangle', 0.16);
  setTimeout(() => blip(659, 0.18, 'triangle', 0.16), 110);
  setTimeout(() => blip(784, 0.32, 'triangle', 0.18), 220);
}

document.getElementById('vic-again').onclick = () => location.reload();

// ─── INTERACTION ────────────────────────────────────────────
knob.addEventListener('mousedown', onDown);
knob.addEventListener('touchstart', onDown, { passive: true });

function onDown(e) {
  if (chaosStarted) return;
  if (!audioStarted) { startAudio(); audioStarted = true; }

  isDragging = true;
  lastY = e.touches ? e.touches[0].clientY : e.clientY;

  if (!chaosScheduled) {
    chaosScheduled = true;
    setTimeout(() => {
      if (!chaosStarted) knob.classList.add('pre-chaos');
    }, 2400);
    setTimeout(startChaos, 3400);
  }
}

window.addEventListener('mousemove', onMove);
window.addEventListener('touchmove', onMove, { passive: true });

function onMove(e) {
  // crosshair tracking (chaos only)
  if (chaosStarted && !chaosWon) {
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const cy = e.touches ? e.touches[0].clientY : e.clientY;
    crosshair.style.left = cx + 'px';
    crosshair.style.top  = cy + 'px';
  }

  if (!isDragging || chaosStarted) return;
  const y     = e.touches ? e.touches[0].clientY : e.clientY;
  const delta = (lastY - y) * 0.0058;
  setVolume(volume + delta, false);
  lastY = y;
}

window.addEventListener('mouseup',  () => { isDragging = false; });
window.addEventListener('touchend', () => { isDragging = false; });

// fallback: click anywhere to init audio
document.body.addEventListener('click', () => {
  if (!audioStarted) { startAudio(); audioStarted = true; }
}, { once: true });
</script>
